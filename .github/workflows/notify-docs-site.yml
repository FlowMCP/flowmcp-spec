name: Notify Docs Site

on:
  push:
    branches: [main]
    # Flat namespace-first layout (Memo 064 flatten): fire on generated artifacts only —
    # per-family <ns>/<version>/dist/** and the root-level cross-family aggregates. Every
    # authored draft edit is committed together with its regenerated dist, so a generated-only
    # trigger still covers all content changes while avoiding a double site deploy.
    paths:
      - '**/dist/**'
      - 'manifest.json'
      - 'inverted-map.json'
      - 'refs.resolved.json'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger flowmcp.github.io rebuild
        run: |
          curl -sS -X POST \
            -H "Authorization: token ${{ secrets.REPO_DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/FlowMCP/flowmcp.github.io/dispatches \
            -d '{"event_type":"spec-updated","client_payload":{"source":"flowmcp-spec","ref":"${{ github.ref }}","sha":"${{ github.sha }}"}}'
          echo "Dispatch sent to flowmcp.github.io"
