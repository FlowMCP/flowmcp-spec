name: Lint Spec Quality

# The spec-quality gate: it builds the docs-payload + bridge from the current draft sources
# (draft/<family>/<version>/spec) and runs the structural audit + the inverse-projection gate
# against the result (ported from memo-init repos/spec, Memo 060 P5).

on:
  pull_request:
    paths:
      - 'draft/**/*.md'
      - 'draft/**/spec.json'
      - 'draft/**/spec-manifest.json'
      - 'draft/**/skill-spec-map.json'
      - 'data/refs.manual.json'
      - 'scripts/**'
  push:
    branches: [main]
    paths:
      - 'draft/**/*.md'
      - 'draft/**/spec.json'
      - 'draft/**/spec-manifest.json'
      - 'draft/**/skill-spec-map.json'
      - 'data/refs.manual.json'
      - 'scripts/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build payload + run spec-quality audit + inverse gate
        run: |
          npm run build
          node scripts/audit-spec-quality.mjs
