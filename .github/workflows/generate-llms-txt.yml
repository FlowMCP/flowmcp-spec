name: Generate llms.txt

# WI-200 (Memo 060 P5): the generator logic now lives in scripts/generate-llms-txt.mjs so the
# chain is locally reproducible (`npm run generate-llms-txt`); this workflow just calls it.

on:
  push:
    paths:
      - 'draft/specification/**/*.md'
      - 'data/refs.manual.json'
      - 'scripts/generate-llms-txt.mjs'
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate llms.txt from spec files
        run: npm run generate-llms-txt

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet generated/llms.txt generated/llms-schema-spec.txt || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add generated/llms.txt generated/llms-schema-spec.txt
          git commit -m "Auto-regenerate llms.txt from spec changes"
          git push
