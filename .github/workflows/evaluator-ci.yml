name: Evaluator CI — RFC2119 Conformance

on:
  pull_request:
    paths:
      - 'spec/v4.0.0/**.md'
      - 'skills/spec-quality/evaluator-spec-rfc2119/**'
  push:
    branches: [main]
    paths:
      - 'spec/v4.0.0/**.md'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run RFC2119 evaluator on all spec files
        id: eval
        run: |
          set -e
          mkdir -p /tmp/eval
          fail_count=0
          warn_count=0
          report="## RFC2119 Conformance Report\n\n"
          report+="| File | Grade | Errors | Warnings | Hints |\n"
          report+="|------|:-----:|:------:|:--------:|:-----:|\n"

          for f in spec/v4.0.0/*.md; do
              name=$(basename "$f")
              result=$(node skills/spec-quality/evaluator-spec-rfc2119/check.mjs --json "$f" 2>/dev/null || echo '{"grade":0,"issues":[]}')
              grade=$(echo "$result" | jq -r .grade)
              errors=$(echo "$result" | jq -r '[.issues[] | select(.severity == "error")] | length')
              warnings=$(echo "$result" | jq -r '[.issues[] | select(.severity == "warning")] | length')
              hints=$(echo "$result" | jq -r '[.issues[] | select(.severity == "hint")] | length')

              report+="| $name | $grade | $errors | $warnings | $hints |\n"

              if [ "$grade" -lt 3 ]; then
                  fail_count=$((fail_count + 1))
              elif [ "$grade" -lt 4 ]; then
                  warn_count=$((warn_count + 1))
              fi
          done

          echo "fail_count=$fail_count" >> $GITHUB_OUTPUT
          echo "warn_count=$warn_count" >> $GITHUB_OUTPUT
          echo -e "$report" > /tmp/eval/report.md
          echo "" >> /tmp/eval/report.md
          echo "Fail count (grade < 3): $fail_count" >> /tmp/eval/report.md
          echo "Warn count (grade < 4): $warn_count" >> /tmp/eval/report.md
          cat /tmp/eval/report.md

      - name: Run evaluator self-tests
        run: node skills/spec-quality/evaluator-spec-rfc2119/tests/run-tests.mjs

      - name: Post PR comment (on PRs only)
        if: github.event_name == 'pull_request' && (steps.eval.outputs.fail_count != '0' || steps.eval.outputs.warn_count != '0')
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const body = fs.readFileSync('/tmp/eval/report.md', 'utf-8')
            github.rest.issues.createComment( {
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
            } )

      - name: Fail on grade < 3
        if: steps.eval.outputs.fail_count != '0'
        run: |
          echo "::error::${{ steps.eval.outputs.fail_count }} spec file(s) have grade < 3 — RFC2119 quality gate failed"
          exit 1
