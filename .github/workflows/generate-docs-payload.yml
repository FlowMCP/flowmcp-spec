name: Generate docs-payload

on:
  push:
    branches: [main]
    paths:
      - 'draft/**/*.md'
      - 'draft/**/spec.json'
      - 'draft/**/spec-manifest.json'
      - 'draft/**/skill-spec-map.json'
      - 'data/refs.manual.json'
      - 'scripts/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build spec payload + bridge + manifest (draft -> dist)
        run: npm run build

      - name: Check for changes
        id: diff
        run: |
          if [ -n "$(git status --porcelain dist/ draft/)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/ draft/
          git commit -m "Auto-regenerate dist payload from spec changes"
          git push
